<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>축의금 대시보드</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { max-width:600px; margin:0 auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:12px; }
.title { font-size:20px; font-weight:bold; margin-bottom:10px; }
</style>
</head>
<body>

<div class="container">
  <div id="app" class="card">불러오는 중...</div>
</div>

<script>
const API_URL = "https://opensheet.elk.sh/1EZcdNae8ZHoQT_xez5CUQI5jJstAgN6D8QRg-4IZSck/A001_신랑";

function loadData() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      // 7행부터 사용 (index 6부터)
      const rows = data.slice(6);

      let total = 0;

      rows.forEach(row => {
        const value = Number(row["합계"] || 0);
        total += value;
      });

      document.getElementById("app").innerHTML = `
        <div class="title">신랑 측 총 축의금</div>
        <div>${total.toLocaleString()} 원</div>
      `;
    })
    .catch(err => {
      document.getElementById("app").innerHTML = "데이터 불러오기 실패";
      console.error(err);
    });
}

loadData();
</script>

</body>
</html>
