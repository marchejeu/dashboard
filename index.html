<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>축의금 대시보드 | wedding marchejeu</title>

<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; }
.container { max-width:600px; margin:0 auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:12px; margin-bottom:12px; }
.title { font-size:20px; font-weight:bold; margin-bottom:10px; }
</style>
</head>

<body>
<div class="container">
  <div id="app" class="card">불러오는 중...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const CLIENT_CODE = params.get("code");
const CLIENT_SIDE = params.get("side") || "신랑";

// 👉 여기만 수정하면 됨
const API_URL = "https://opensheet.elk.sh/1EZcdNae8ZHoQT_xez5CUQI5jJstAgN6D8QRg-4IZSck/A001_신랑";

function loadData() {
  fetch(`${API_URL}?code=${CLIENT_CODE}&side=${CLIENT_SIDE}`, {
    method: "GET",
    mode: "cors",
    redirect: "follow"
  })
    .then(res => {
      if (!res.ok) throw new Error("네트워크 오류");
      return res.json();
    })
    .then(data => {
      if (data.error) {
        document.getElementById("app").innerHTML = data.error;
        return;
      }

      const total = data.records.reduce((s,r)=>s+r.total,0);

      document.getElementById("app").innerHTML = `
        <div class="title">${CLIENT_SIDE} 측 총 축의금</div>
        <div>${total.toLocaleString()} 원</div>
      `;
    })
    .catch(err => {
      console.error(err);
      document.getElementById("app").innerHTML = "데이터 불러오기 실패";
    });
}

loadData();
</script>
</body>
</html>
